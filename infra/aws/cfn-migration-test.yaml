AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Migration test environment — provisions one Windows Server 2022 and one
  Ubuntu 22.04 LTS EC2 instance pre-loaded with AWS agents and artifacts so
  that the Azure runbook cleanup can be exercised end-to-end after Azure
  Migrate cutover.

# ──────────────────────────────────────────────────────────────────────────────
# Parameters
# ──────────────────────────────────────────────────────────────────────────────
Parameters:

  AllowCidr:
    Type: String
    Default: '0.0.0.0/0'
    Description: >
      CIDR allowed inbound on RDP (3389) and SSH (22).
      Use your own public IP (x.x.x.x/32) for tighter security.

  WindowsInstanceType:
    Type: String
    Default: t3.medium
    Description: Instance type for the Windows Server 2022 VM.

  LinuxInstanceType:
    Type: String
    Default: t3.small
    Description: Instance type for the Ubuntu 22.04 LTS VM.

  # Resolved at deploy time from AWS SSM public parameter store — no hard-coded AMI IDs.
  WindowsAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base

  LinuxAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    # Ubuntu 22.04 LTS — explicitly supported by ASR Mobility Service 9.x.
    # Amazon Linux 2023 is NOT supported by Azure Site Recovery.
    Default: /aws/service/canonical/ubuntu/server/22.04/stable/current/amd64/hvm/ebs-gp2/ami-id

# ──────────────────────────────────────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────────────────────────────────────
Resources:

  # ── VPC + networking ────────────────────────────────────────────────────────

  MigTestVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.10.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: mig-test-vpc }]

  MigTestSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MigTestVpc
      CidrBlock: 10.10.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: [{ Key: Name, Value: mig-test-subnet }]

  MigTestIgw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{ Key: Name, Value: mig-test-igw }]

  MigTestVpcGwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MigTestVpc
      InternetGatewayId: !Ref MigTestIgw

  MigTestRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MigTestVpc
      Tags: [{ Key: Name, Value: mig-test-rt }]

  MigTestDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: MigTestVpcGwAttach
    Properties:
      RouteTableId: !Ref MigTestRouteTable
      DestinationCidrBlock: '0.0.0.0/0'
      GatewayId: !Ref MigTestIgw

  MigTestSubnetRtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref MigTestSubnet
      RouteTableId: !Ref MigTestRouteTable

  # ── Security groups ─────────────────────────────────────────────────────────

  WindowsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Migration test - Windows (RDP + outbound HTTPS for Azure Migrate)
      VpcId: !Ref MigTestVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: !Ref AllowCidr
          Description: RDP
        # Azure Site Recovery replication channel (inbound from replication appliance)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'
          Description: HTTPS inbound (Azure Migrate appliance to agent)
        - IpProtocol: tcp
          FromPort: 9443
          ToPort: 9443
          CidrIp: '0.0.0.0/0'
          Description: ASR replication data channel
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          Description: All outbound (required for Azure Migrate + SSM + package downloads)
      Tags: [{ Key: Name, Value: mig-test-windows-sg }]

  LinuxSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Migration test - Linux (SSH + outbound HTTPS for Azure Migrate)
      VpcId: !Ref MigTestVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowCidr
          Description: SSH
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: '0.0.0.0/0'
          Description: HTTPS inbound
        - IpProtocol: tcp
          FromPort: 9443
          ToPort: 9443
          CidrIp: '0.0.0.0/0'
          Description: ASR replication data channel
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: '0.0.0.0/0'
          Description: All outbound
      Tags: [{ Key: Name, Value: mig-test-linux-sg }]

  # ── IAM — instance profile with SSM + CloudWatch managed policies ───────────

  MigTestInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: mig-test-instance-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags: [{ Key: Name, Value: mig-test-instance-role }]

  MigTestInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: mig-test-instance-profile
      Roles: [!Ref MigTestInstanceRole]

  # ── Windows Server 2022 instance ────────────────────────────────────────────

  WindowsInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAmiId
      InstanceType: !Ref WindowsInstanceType
      SubnetId: !Ref MigTestSubnet
      SecurityGroupIds: [!Ref WindowsSg]
      IamInstanceProfile: !Ref MigTestInstanceProfile
      Tags:
        - { Key: Name,  Value: mig-test-win }
        - { Key: Role,  Value: migration-source }
        - { Key: OS,    Value: Windows }
      UserData:
        Fn::Base64: |
          <powershell>
          # Minimal UserData — only ensure SSM agent is running so we can
          # reach the VM via SSM Run Command for the pre-scan and, later,
          # the artifact-planting step.  Nothing is pre-seeded here.
          $svc = Get-Service -Name 'AmazonSSMAgent' -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -ne 'Running') { Start-Service AmazonSSMAgent }
          "UserData complete: $(Get-Date -Format 'o')" | Set-Content 'C:\cfn-userdata-complete.txt'
          </powershell>

  # ── Ubuntu 22.04 LTS instance ──────────────────────────────────────────────
  # NOTE: Amazon Linux 2023 is NOT supported by Azure Site Recovery.
  # Use Ubuntu 22.04, RHEL 8/9, or CentOS 7/8 as the Linux source VM.

  LinuxInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LinuxAmiId
      InstanceType: !Ref LinuxInstanceType
      SubnetId: !Ref MigTestSubnet
      SecurityGroupIds: [!Ref LinuxSg]
      IamInstanceProfile: !Ref MigTestInstanceProfile
      Tags:
        - { Key: Name,  Value: mig-test-lnx }
        - { Key: Role,  Value: migration-source }
        - { Key: OS,    Value: Linux }
      UserData:
        Fn::Base64: |
          #!/bin/bash
          # Minimal UserData — ensure SSM agent is running so we can reach the VM
          # via SSM Run Command for the pre-scan and artifact-planting step.
          exec > >(tee /var/log/cfn-userdata.log) 2>&1
          # Install SSM agent on Ubuntu 22.04
          snap install amazon-ssm-agent --classic || true
          systemctl enable --now snap.amazon-ssm-agent.amazon-ssm-agent.service || true
          echo "UserData complete: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

# ──────────────────────────────────────────────────────────────────────────────
# Outputs
# ──────────────────────────────────────────────────────────────────────────────
Outputs:

  WindowsInstanceId:
    Value: !Ref WindowsInstance
    Description: EC2 instance ID of the Windows test VM
    Export: { Name: !Sub '${AWS::StackName}-WindowsInstanceId' }

  LinuxInstanceId:
    Value: !Ref LinuxInstance
    Description: EC2 instance ID of the Linux test VM
    Export: { Name: !Sub '${AWS::StackName}-LinuxInstanceId' }

  WindowsPublicIp:
    Value: !GetAtt WindowsInstance.PublicIp
    Description: Public IP for RDP / Azure Migrate appliance targeting

  LinuxPublicIp:
    Value: !GetAtt LinuxInstance.PublicIp
    Description: Public IP for SSH / Azure Migrate appliance targeting

  WindowsPrivateIp:
    Value: !GetAtt WindowsInstance.PrivateIp

  LinuxPrivateIp:
    Value: !GetAtt LinuxInstance.PrivateIp

  SubnetId:
    Value: !Ref MigTestSubnet
    Export: { Name: !Sub '${AWS::StackName}-SubnetId' }

  VpcId:
    Value: !Ref MigTestVpc
    Export: { Name: !Sub '${AWS::StackName}-VpcId' }
