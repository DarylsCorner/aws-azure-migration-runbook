name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  powershell-syntax:
    name: PowerShell syntax check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check syntax of all .ps1 files
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Filter *.ps1 -Exclude *.Tests.ps1
          $errors = @()
          foreach ($f in $files) {
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $f.FullName, [ref]$null, [ref]$parseErrors) | Out-Null
            if ($parseErrors.Count -gt 0) {
              foreach ($e in $parseErrors) {
                $errors += "$($f.FullName):$($e.Extent.StartLineNumber): $($e.Message)"
              }
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "ERROR: $_" -ForegroundColor Red }
            exit 1
          }
          Write-Host "All $($files.Count) PowerShell files parsed cleanly."

  shellcheck:
    name: ShellCheck (Bash scripts)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
